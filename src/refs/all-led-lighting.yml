doe-led-basics:
  type: web
  title: "LED Basics"
  author: "U.S. Department of Energy"
  url: "https://www.energy.gov/cmei/ssl/led-basics"
  note: "Plain-language official primer on LED operation, white-light generation, phosphor conversion, and why LEDs are not simply white bulbs."

#----------------------------------------------------------------------------------------
# Use for: Accessible statements on efficiency, heat, directionality, lifetime, and
# Use for: consumer-visible LED advantages.
# Reading angle: Good for explaining why LED adoption happened quickly and why readers already
# Reading angle: think of LEDs as efficient long-life replacements.
# Caution: Consumer education source; avoid leaning on it for engineering-level reliability,
# Caution: driver, or architectural claims.
