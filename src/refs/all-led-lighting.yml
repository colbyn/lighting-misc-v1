#----------------------------------------------------------------------------------------
# Use for: Opening LED literacy: semiconductor device, solid-state lighting, phosphor-converted
# Use for: white light, and LED-as-electronic-source framing.
# Reading angle: Use it to support the plain claim that LEDs are not filament lamps or
# Reading angle: gas-discharge lamps. It is strongest as a public-facing authority for basic
# Reading angle: definitions.
